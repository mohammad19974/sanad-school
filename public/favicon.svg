<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DB88A"/>
      <stop offset="100%" stop-color="#2E5138"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5EED8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- خلفية مربعة مدوّرة (iOS style) -->
  <rect width="512" height="512" rx="118" ry="118" fill="url(#bg)"/>

  <!-- توهّج خفيف خلف الدرع -->
  <path d="M256 88 L120 138 L120 252 Q120 376 256 444 Q392 376 392 252 L392 138 Z"
        fill="rgba(0,0,0,0.20)" filter="url(#softShadow)" transform="translate(0,6)"/>

  <!-- الدرع الأبيض -->
  <path d="M256 80 L120 132 L120 246 Q120 372 256 440 Q392 372 392 246 L392 132 Z"
        fill="url(#shield)"/>

  <!-- قلب أخضر في المنتصف — يرمز للدعم والرعاية -->
  <path d="M256 320 C 256 320, 184 264, 184 220 C 184 192, 208 178, 232 188 C 244 192, 252 200, 256 212 C 260 200, 268 192, 280 188 C 304 178, 328 192, 328 220 C 328 264, 256 320, 256 320 Z"
        fill="#4A7C59"/>

  <!-- نقطة لمعان فوق القلب -->
  <ellipse cx="220" cy="212" rx="12" ry="6" fill="rgba(255,255,255,0.45)" transform="rotate(-30 220 212)"/>
</svg>
